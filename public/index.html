<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Пинай мяч ⚽ — 3D онлайн</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0d161f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    overflow: hidden;
  }
  h1 { margin: 12px 0 2px; font-size: 20px; }
  .bar { color: #9fb3c8; font-size: 13px; margin-bottom: 6px; text-align: center; }
  .score {
    display: flex; gap: 16px; align-items: center;
    font-size: 24px; font-weight: 800; margin-bottom: 6px;
  }
  .score .red { color: #ff5a5a; }
  .score .blue { color: #4ca3ff; }
  #stage {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.55);
    line-height: 0;
  }
  #stage canvas { display: block; touch-action: none; cursor: grab; }
  #stage canvas:active { cursor: grabbing; }
  #overlay {
    position: fixed; inset: 0; background: rgba(8,13,18,.94);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 10;
  }
  #overlay h2 { font-size: 28px; }
  #overlay p { color: #9fb3c8; max-width: 400px; text-align: center; font-size: 14px; }
  #name {
    padding: 10px 14px; font-size: 16px; border-radius: 8px; border: 2px solid #2b3b4a;
    background: #1b2733; color: #fff; width: 240px; text-align: center;
  }
  #play {
    padding: 10px 28px; font-size: 17px; font-weight: 800; border: none;
    border-radius: 9px; background: #ffd166; color: #14202c; cursor: pointer;
  }
  #status { font-size: 13px; color: #ffb4b4; height: 16px; }
  kbd {
    background: #2b3b4a; border-radius: 4px; padding: 1px 6px; font-size: 12px;
    border: 1px solid #3a4d5e;
  }

  /* Сенсорное управление */
  #touch {
    display: none;
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 200px; z-index: 5;
    pointer-events: none;
    justify-content: space-between; align-items: flex-end;
    padding: 0 24px 26px;
  }
  #stick {
    pointer-events: auto;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,.10);
    border: 2px solid rgba(255,255,255,.25);
    position: relative; touch-action: none;
  }
  #knob {
    position: absolute; left: 50%; top: 50%;
    width: 60px; height: 60px; margin: -30px 0 0 -30px;
    border-radius: 50%;
    background: rgba(255,209,102,.85);
    box-shadow: 0 3px 10px rgba(0,0,0,.4);
    transform: translate(0,0);
  }
  #kickBtn {
    pointer-events: auto;
    width: 110px; height: 110px; border-radius: 50%;
    border: none; touch-action: none;
    background: rgba(255,90,90,.85); color: #fff;
    font-size: 18px; font-weight: 900; letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(0,0,0,.45);
  }
  #kickBtn:active { background: rgba(255,90,90,1); transform: scale(.95); }
</style>
</head>
<body>
  <h1>Пинай мяч ⚽ — 3D онлайн</h1>
  <div class="bar">
    Бег — <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> &nbsp;·&nbsp; удар — <kbd>Пробел</kbd> &nbsp;·&nbsp; камера — тяни мышкой по полю
  </div>
  <div class="score">
    <span class="red" id="sRed">0</span><span>:</span><span class="blue" id="sBlue">0</span>
  </div>
  <div id="stage"></div>

  <div id="touch">
    <div id="stick"><div id="knob"></div></div>
    <button id="kickBtn">УДАР</button>
  </div>

  <div id="overlay">
    <h2>⚽ Пинай мяч — 3D</h2>
    <p>Управляй своим 3D-персонажем от третьего лица. Беги к мячу и толкай его в чужие ворота.
       Камера — тяни мышкой (или пальцем по полю). Движение — относительно камеры.</p>
    <input id="name" placeholder="Твоё имя" maxlength="16" />
    <button id="play">Играть</button>
    <div id="status"></div>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import { FBXLoader } from "three/addons/loaders/FBXLoader.js";
import { clone as skeletonClone } from "three/addons/utils/SkeletonUtils.js";

const sRed = document.getElementById("sRed");
const sBlue = document.getElementById("sBlue");
const overlay = document.getElementById("overlay");
const statusEl = document.getElementById("status");
const stage = document.getElementById("stage");

let cfg = { W: 1000, H: 620, WALL: 14, GOAL_H: 220, PR: 18, BR: 13 };
let state = { ball: { x: 500, y: 310, z: 0 }, players: [], score: { red: 0, blue: 0 } };
let myId = null;
let ws = null;
let stateSeq = 0; // растёт при каждом обновлении состояния от сервера

// ---------- Ввод ----------
const pressed = new Set();          // нажатые клавиши движения
let kickHeld = false;
const stickVec = { x: 0, y: 0, active: false };
let camYaw = 0;                     // орбита камеры вокруг игрока
let camPitch = 0.62;               // наклон камеры
let lastSent = "", lastSendT = 0;

// ---------- Связь с сервером ----------
function connect(name) {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}`);
  statusEl.textContent = "Подключение…";
  ws.onopen = () => {
    statusEl.textContent = "";
    ws.send(JSON.stringify({ type: "join", name }));
    overlay.style.display = "none";
    if (isTouch) touchPanel.style.display = "flex";
  };
  ws.onclose = () => {
    statusEl.textContent = "Соединение потеряно. Обнови страницу.";
    overlay.style.display = "flex";
  };
  ws.onerror = () => { statusEl.textContent = "Ошибка соединения."; };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "config") { cfg = msg; buildField(); resize(); }
    else if (msg.type === "you") myId = msg.id;
    else if (msg.type === "state") {
      state = msg;
      stateSeq++;
      sRed.textContent = msg.score.red;
      sBlue.textContent = msg.score.blue;
    }
  };
}

document.getElementById("play").addEventListener("click", () => {
  const name = document.getElementById("name").value.trim() || "Игрок";
  connect(name);
});
document.getElementById("name").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("play").click();
});

// Клавиатура
const MOVE_KEYS = { KeyW: 1, KeyS: 1, KeyA: 1, KeyD: 1, ArrowUp: 1, ArrowDown: 1, ArrowLeft: 1, ArrowRight: 1 };
window.addEventListener("keydown", (e) => {
  if (e.code === "Space") { kickHeld = true; e.preventDefault(); return; }
  if (MOVE_KEYS[e.code]) { pressed.add(e.code); e.preventDefault(); }
});
window.addEventListener("keyup", (e) => {
  if (e.code === "Space") { kickHeld = false; e.preventDefault(); return; }
  if (MOVE_KEYS[e.code]) { pressed.delete(e.code); e.preventDefault(); }
});

// Вычисление вектора движения относительно камеры и отправка на сервер
function computeAndSend(now) {
  // Локальный вектор: x — вправо, z — назад (к камере)
  let lx = 0, lz = 0;
  if (stickVec.active) { lx = stickVec.x; lz = stickVec.y; }
  else {
    if (pressed.has("KeyD") || pressed.has("ArrowRight")) lx += 1;
    if (pressed.has("KeyA") || pressed.has("ArrowLeft")) lx -= 1;
    if (pressed.has("KeyS") || pressed.has("ArrowDown")) lz += 1;
    if (pressed.has("KeyW") || pressed.has("ArrowUp")) lz -= 1;
  }
  // Базисы камеры на плоскости поля
  const fx = -Math.sin(camYaw), fz = -Math.cos(camYaw); // «вперёд» (от камеры)
  const rx = Math.cos(camYaw), rz = -Math.sin(camYaw);  // «вправо»
  const fAmt = -lz; // вперёд = -z
  let mx = rx * lx + fx * fAmt;
  let my = rz * lx + fz * fAmt;
  const len = Math.hypot(mx, my);
  if (len > 1) { mx /= len; my /= len; }

  const packed = JSON.stringify({
    type: "input",
    mx: Math.round(mx * 100) / 100,
    my: Math.round(my * 100) / 100,
    kick: kickHeld,
  });
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (packed === lastSent) return;
  lastSent = packed; lastSendT = now;
  ws.send(packed);
}

// ---------- 3D сцена ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d161f);
scene.fog = new THREE.Fog(0x0d161f, 1600, 3200);

const camera = new THREE.PerspectiveCamera(55, 16 / 10, 1, 8000);
camera.position.set(0, 400, 600);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xbfe3ff, 0x35502f, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(-300, 900, 500);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 100;
sun.shadow.camera.far = 2500;
sun.shadow.camera.left = -900;
sun.shadow.camera.right = 900;
sun.shadow.camera.top = 700;
sun.shadow.camera.bottom = -700;
scene.add(sun);

// ---------- Загрузка 3D-модели персонажа (Mixamo FBX) ----------
const clock = new THREE.Clock();
let charTemplate = null;          // загруженная модель — шаблон для клонирования
let idleClip = null, runClip = null, kickClip = null;
let charScale = 0.18, modelTurn = 0; // поворот модели, чтобы лицо смотрело по ходу движения

// Убираем смещение корня (Hips.position) — бег «на месте», позицией рулит сервер
function inPlace(clip) {
  if (clip) clip.tracks = clip.tracks.filter((t) => !t.name.endsWith(".position"));
  return clip;
}

const fbxLoader = new FBXLoader();
fbxLoader.load("models/idle.fbx", (obj) => {
  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3(); box.getSize(size);
  charScale = (cfg.PR * 3.4) / (size.y || 200);
  idleClip = inPlace(obj.animations && obj.animations[0] ? obj.animations[0] : null);
  obj.traverse((c) => { if (c.isMesh) { c.castShadow = true; c.frustumCulled = false; } });
  charTemplate = obj;
  // Пересоздать уже существующих игроков с моделью
  for (const [, pm] of playerMeshes) scene.remove(pm.group);
  playerMeshes.clear();
}, undefined, (err) => {
  console.warn("Модель не загрузилась, оставляю кубических человечков", err);
});

// Анимация бега — отдельным файлом, тот же скелет Mixamo
fbxLoader.load("models/run.fbx", (obj) => {
  runClip = inPlace(obj.animations && obj.animations[0] ? obj.animations[0] : null);
  if (!runClip) return;
  // Добавить действие бега уже существующим персонажам
  for (const [, pm] of playerMeshes) {
    if (pm.char && pm.char.mixer && !pm.char.runAction) {
      pm.char.runAction = pm.char.mixer.clipAction(runClip);
      pm.char.runAction.play();
      pm.char.runAction.setEffectiveWeight(0);
    }
  }
}, undefined, (err) => {
  console.warn("Анимация бега не загрузилась", err);
});

// Анимация удара (проигрывается один раз при пинке)
fbxLoader.load("models/kick.fbx", (obj) => {
  kickClip = inPlace(obj.animations && obj.animations[0] ? obj.animations[0] : null);
  if (!kickClip) return;
  for (const [, pm] of playerMeshes) {
    if (pm.char && pm.char.mixer && !pm.char.kickAction) attachKick(pm.char);
  }
}, undefined, (err) => {
  console.warn("Анимация удара не загрузилась", err);
});

// Орбита камеры мышью/пальцем по полю
let dragId = null, dragX = 0, dragY = 0;
renderer.domElement.addEventListener("pointerdown", (e) => {
  dragId = e.pointerId; dragX = e.clientX; dragY = e.clientY;
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener("pointermove", (e) => {
  if (e.pointerId !== dragId) return;
  camYaw -= (e.clientX - dragX) * 0.005;
  camPitch = Math.max(0.2, Math.min(1.25, camPitch - (e.clientY - dragY) * 0.004));
  dragX = e.clientX; dragY = e.clientY;
});
function endDrag(e) { if (e.pointerId === dragId) dragId = null; }
renderer.domElement.addEventListener("pointerup", endDrag);
renderer.domElement.addEventListener("pointercancel", endDrag);

function fx(x) { return x - cfg.W / 2; }
function fz(y) { return y - cfg.H / 2; }

function pitchTexture() {
  const W = cfg.W, H = cfg.H, WALL = cfg.WALL, GOAL_H = cfg.GOAL_H;
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const g = c.getContext("2d");
  const stripe = 64;
  for (let i = 0; i * stripe < W; i++) {
    g.fillStyle = i % 2 ? "#2f9450" : "#2a8748";
    g.fillRect(i * stripe, 0, stripe, H);
  }
  g.strokeStyle = "rgba(255,255,255,.75)";
  g.lineWidth = 5;
  g.strokeRect(WALL, WALL, W - WALL * 2, H - WALL * 2);
  g.beginPath(); g.moveTo(W / 2, WALL); g.lineTo(W / 2, H - WALL); g.stroke();
  g.beginPath(); g.arc(W / 2, H / 2, 80, 0, Math.PI * 2); g.stroke();
  g.fillStyle = "rgba(255,255,255,.85)";
  g.beginPath(); g.arc(W / 2, H / 2, 8, 0, Math.PI * 2); g.fill();
  const gt = (H - GOAL_H) / 2, area = 120;
  g.strokeRect(WALL, gt - 30, area, GOAL_H + 60);
  g.strokeRect(W - WALL - area, gt - 30, area, GOAL_H + 60);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

// Текстура мяча (CC0 equirectangular-развёртка футбольного мяча 2:1)
const ballTex = new THREE.TextureLoader().load("textures/ball.png");
ballTex.colorSpace = THREE.SRGBColorSpace;
ballTex.anisotropy = 8;

let fieldGroup = null, ballMesh = null;
const prevBall = { x: 0, z: 0, init: false };

function buildField() {
  if (fieldGroup) scene.remove(fieldGroup);
  fieldGroup = new THREE.Group();
  const { W, H, WALL, GOAL_H, BR } = cfg;

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(W, H),
    new THREE.MeshStandardMaterial({ map: pitchTexture(), roughness: 0.95 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0.6;
  ground.receiveShadow = true;
  fieldGroup.add(ground);

  const base = new THREE.Mesh(
    new THREE.BoxGeometry(W + 80, 40, H + 80),
    new THREE.MeshStandardMaterial({ color: 0x16221c, roughness: 1 })
  );
  base.position.y = -24;
  base.receiveShadow = true;
  fieldGroup.add(base);

  const wallH = 34;
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xeef2f5, roughness: 0.6 });
  function wall(cx, cz, sx, sz) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(sx, wallH, sz), wallMat);
    m.position.set(cx, wallH / 2, cz);
    m.castShadow = true; m.receiveShadow = true;
    fieldGroup.add(m);
  }
  wall(0, fz(0) - WALL / 2, W, WALL);
  wall(0, fz(H) + WALL / 2, W, WALL);
  const seg = (H - GOAL_H) / 2;
  wall(fx(0) - WALL / 2, fz(seg / 2), WALL, seg);
  wall(fx(0) - WALL / 2, fz(H - seg / 2), WALL, seg);
  wall(fx(W) + WALL / 2, fz(seg / 2), WALL, seg);
  wall(fx(W) + WALL / 2, fz(H - seg / 2), WALL, seg);

  function goalPosts(side, color) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.1 });
    const gt = (H - GOAL_H) / 2, gb = gt + GOAL_H;
    const x = side === "left" ? fx(0) - WALL : fx(W) + WALL;
    const postH = 60;
    for (const zy of [gt, gb]) {
      const post = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, postH, 12), mat);
      post.position.set(x, postH / 2, fz(zy));
      post.castShadow = true;
      fieldGroup.add(post);
    }
    const bar = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, GOAL_H, 12), mat);
    bar.rotation.x = Math.PI / 2;
    bar.position.set(x, postH, fz((gt + gb) / 2));
    bar.castShadow = true;
    fieldGroup.add(bar);
  }
  goalPosts("left", 0xff5a5a);
  goalPosts("right", 0x4ca3ff);

  scene.add(fieldGroup);

  if (!ballMesh) {
    ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(BR, 24, 24),
      new THREE.MeshStandardMaterial({ map: ballTex, roughness: 0.45 })
    );
    ballMesh.castShadow = true;
    scene.add(ballMesh);
  } else {
    ballMesh.geometry.dispose();
    ballMesh.geometry = new THREE.SphereGeometry(BR, 24, 24);
  }
  ballMesh.position.set(0, BR, 0);
  prevBall.init = false;
}

// ---------- 3D-персонажи ----------
const playerMeshes = new Map(); // id -> {group, label}

function makeLabel(text) {
  const c = document.createElement("canvas");
  c.width = 256; c.height = 64;
  const g = c.getContext("2d");
  g.font = "bold 34px system-ui";
  g.textAlign = "center"; g.textBaseline = "middle";
  g.lineWidth = 6; g.strokeStyle = "rgba(0,0,0,.7)";
  g.strokeText(text, 128, 34);
  g.fillStyle = "#fff";
  g.fillText(text, 128, 34);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  spr.scale.set(110, 28, 1);
  return spr;
}

// Кубический человечек — запасной вариант, если модель не загрузилась
function buildBlocky(group, p) {
  const R = cfg.PR;
  const jersey = new THREE.MeshStandardMaterial({ color: p.c, roughness: 0.55 });
  const skin = new THREE.MeshStandardMaterial({ color: 0xffd9a8, roughness: 0.7 });
  const dark = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.8 });
  const legGeo = new THREE.BoxGeometry(R * 0.5, R * 0.9, R * 0.5);
  const legL = new THREE.Mesh(legGeo, dark); legL.position.set(-R * 0.3, R * 0.45, 0);
  const legR = new THREE.Mesh(legGeo, dark); legR.position.set(R * 0.3, R * 0.45, 0);
  const torso = new THREE.Mesh(new THREE.BoxGeometry(R * 1.2, R * 1.1, R * 0.7), jersey);
  torso.position.y = R * 1.45;
  const armGeo = new THREE.BoxGeometry(R * 0.32, R * 1.0, R * 0.32);
  const armL = new THREE.Mesh(armGeo, skin); armL.position.set(-R * 0.78, R * 1.45, 0);
  const armR = new THREE.Mesh(armGeo, skin); armR.position.set(R * 0.78, R * 1.45, 0);
  const head = new THREE.Mesh(new THREE.SphereGeometry(R * 0.55, 18, 18), skin);
  head.position.y = R * 2.35;
  const visor = new THREE.Mesh(new THREE.BoxGeometry(R * 0.6, R * 0.18, R * 0.25), dark);
  visor.position.set(0, R * 2.4, R * 0.5);
  for (const m of [legL, legR, torso, armL, armR, head, visor]) { m.castShadow = true; group.add(m); }
}

// Клон Mixamo-модели со своим скелетом, тонировкой и анимациями
function makeCharacter(p) {
  const root = skeletonClone(charTemplate);
  root.scale.setScalar(charScale);
  root.rotation.y = modelTurn;
  root.traverse((c) => {
    if (c.isMesh) {
      c.material = Array.isArray(c.material) ? c.material.map((m) => m.clone()) : c.material.clone();
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      for (const m of mats) if (m.color) m.color.lerp(new THREE.Color(p.c), 0.4);
      c.castShadow = true;
    }
  });
  const mixer = new THREE.AnimationMixer(root);
  const char = { root, mixer, idleAction: null, runAction: null, kickAction: null, kicking: false };
  if (idleClip) { char.idleAction = mixer.clipAction(idleClip); char.idleAction.play(); }
  if (runClip) { char.runAction = mixer.clipAction(runClip); char.runAction.play(); char.runAction.setEffectiveWeight(0); }
  if (kickClip) attachKick(char);
  mixer.addEventListener("finished", (e) => {
    if (e.action === char.kickAction) char.kicking = false;
  });
  return char;
}

// Анимация удара — разовая (не зацикленная)
function attachKick(char) {
  char.kickAction = char.mixer.clipAction(kickClip);
  char.kickAction.setLoop(THREE.LoopOnce, 1);
  char.kickAction.clampWhenFinished = false;
}

function triggerKick(char) {
  if (!char.kickAction) return;
  char.kicking = true;
  char.kickAction.reset();
  char.kickAction.setEffectiveWeight(1);
  char.kickAction.play();
}

function makePlayer(p) {
  const group = new THREE.Group();
  const R = cfg.PR;
  let char = null;
  if (charTemplate) { char = makeCharacter(p); group.add(char.root); }
  else buildBlocky(group, p);

  if (p.id === myId) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(R + 5, R + 12, 28),
      new THREE.MeshBasicMaterial({ color: 0xffd166, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 1.2;
    group.add(ring);
  }

  const label = makeLabel(p.n);
  label.position.y = (charTemplate ? R * 3.7 : R * 3.1);
  group.add(label);

  scene.add(group);
  return { group, label, char, prevX: p.x, prevY: p.y, seq: -1, prevK: 0, moving: false };
}

function syncPlayers() {
  const seen = new Set();
  for (const p of state.players) {
    seen.add(p.id);
    let pm = playerMeshes.get(p.id);
    if (!pm) { pm = makePlayer(p); playerMeshes.set(p.id, pm); }
    pm.group.position.x = fx(p.x);
    pm.group.position.z = fz(p.y);
    // Плавный поворот к heading (учёт перехода через ±π)
    let target = p.h || 0;
    let cur = pm.group.rotation.y;
    let diff = ((target - cur + Math.PI) % (Math.PI * 2)) - Math.PI;
    pm.group.rotation.y = cur + diff * 0.25;

    // Анимации: стой / бег / удар
    if (pm.char) {
      const c = pm.char;
      if (pm.seq !== stateSeq) {
        const sp = Math.hypot(p.x - pm.prevX, p.y - pm.prevY);
        pm.prevX = p.x; pm.prevY = p.y; pm.seq = stateSeq;
        pm.moving = sp > 0.6;
        const kNow = p.k || 0;
        if (kNow && !pm.prevK) triggerKick(c); // фронт нажатия удара
        pm.prevK = kNow;
      }
      const kickW = c.kicking ? 1 : 0;
      const runW = (!c.kicking && pm.moving) ? 1 : 0;
      const idleW = (!c.kicking && !pm.moving) ? 1 : 0;
      const blend = (act, tw) => { if (act) act.setEffectiveWeight(act.getEffectiveWeight() + (tw - act.getEffectiveWeight()) * 0.3); };
      blend(c.kickAction, kickW);
      blend(c.runAction, runW);
      blend(c.idleAction, idleW);
    }
  }
  for (const [id, pm] of playerMeshes) {
    if (!seen.has(id)) { scene.remove(pm.group); playerMeshes.delete(id); }
  }
}

// ---------- Размер ----------
function resize() {
  const maxW = Math.min(window.innerWidth * 0.96, 1100);
  const aspect = 16 / 10;
  const w = maxW, hh = Math.round(maxW / aspect);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, hh);
  camera.aspect = aspect;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);

// ---------- Сенсорное управление ----------
const isTouch = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;
const touchPanel = document.getElementById("touch");
const stick = document.getElementById("stick");
const knob = document.getElementById("knob");
const kickBtn = document.getElementById("kickBtn");

const STICK_MAX = 46;
let stickId = null, stickCx = 0, stickCy = 0;
function stickUpdate(e) {
  let dx = e.clientX - stickCx, dy = e.clientY - stickCy;
  const dist = Math.hypot(dx, dy) || 0.001;
  const clamped = Math.min(dist, STICK_MAX);
  knob.style.transform = `translate(${dx / dist * clamped}px, ${dy / dist * clamped}px)`;
  stickVec.x = Math.max(-1, Math.min(1, dx / STICK_MAX));
  stickVec.y = Math.max(-1, Math.min(1, dy / STICK_MAX));
  stickVec.active = true;
}
stick.addEventListener("pointerdown", (e) => {
  stickId = e.pointerId;
  const r = stick.getBoundingClientRect();
  stickCx = r.left + r.width / 2; stickCy = r.top + r.height / 2;
  stick.setPointerCapture(e.pointerId);
  stickUpdate(e); e.preventDefault();
});
stick.addEventListener("pointermove", (e) => {
  if (e.pointerId === stickId) { stickUpdate(e); e.preventDefault(); }
});
function stickRelease(e) {
  if (e.pointerId !== stickId) return;
  stickId = null;
  knob.style.transform = "translate(0,0)";
  stickVec.x = 0; stickVec.y = 0; stickVec.active = false;
}
stick.addEventListener("pointerup", stickRelease);
stick.addEventListener("pointercancel", stickRelease);

kickBtn.addEventListener("pointerdown", (e) => { kickHeld = true; e.preventDefault(); });
kickBtn.addEventListener("pointerup", (e) => { kickHeld = false; e.preventDefault(); });
kickBtn.addEventListener("pointercancel", () => { kickHeld = false; });

// ---------- Цикл ----------
buildField();
resize();

const camTarget = new THREE.Vector3(0, 0, 0);
const desired = new THREE.Vector3();

function animate(now) {
  requestAnimationFrame(animate);
  now = now || 0;

  computeAndSend(now);

  const dt = clock.getDelta();
  for (const [, pm] of playerMeshes) if (pm.char) pm.char.mixer.update(dt);

  // Мяч
  if (ballMesh) {
    const bx = fx(state.ball.x), bz = fz(state.ball.y);
    if (prevBall.init) {
      const dx = bx - prevBall.x, dz = bz - prevBall.z;
      const dist = Math.hypot(dx, dz);
      if (dist > 0.01) {
        const axis = new THREE.Vector3(dz, 0, -dx).normalize();
        ballMesh.rotateOnWorldAxis(axis, dist / cfg.BR);
      }
    }
    ballMesh.position.set(bx, cfg.BR + (state.ball.z || 0), bz);
    prevBall.x = bx; prevBall.z = bz; prevBall.init = true;
  }

  syncPlayers();

  // Камера следует за своим игроком
  const me = state.players.find((p) => p.id === myId);
  if (me) { camTarget.set(fx(me.x), 30, fz(me.y)); }
  else { camTarget.set(0, 30, 0); }

  const DIST = 260;
  desired.set(
    camTarget.x + Math.sin(camYaw) * Math.cos(camPitch) * DIST,
    camTarget.y + Math.sin(camPitch) * DIST,
    camTarget.z + Math.cos(camYaw) * Math.cos(camPitch) * DIST
  );
  camera.position.lerp(desired, 0.12);
  camera.lookAt(camTarget.x, camTarget.y + 24, camTarget.z);

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);
</script>
